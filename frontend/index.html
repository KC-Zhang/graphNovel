<!doctype html>
<html lang="zh">
  <head>
    <script>
      (() => {
        const supportedLocales = ['zh', 'en']
        const normalize = value => String(value || '').trim().toLowerCase().replace('_', '-')
        const matchLocale = value => {
          const normalized = normalize(value)
          if (!normalized) return ''
          const exact = supportedLocales.find(locale => normalize(locale) === normalized)
          if (exact) return exact
          const baseLanguage = normalized.split('-')[0]
          return supportedLocales.find(locale => normalize(locale) === baseLanguage) || ''
        }
        const savedLocale = localStorage.getItem('locale')
        const browserLocales = Array.isArray(navigator.languages) && navigator.languages.length
          ? navigator.languages
          : [navigator.language]
        document.documentElement.lang = matchLocale(savedLocale)
          || browserLocales.map(matchLocale).find(Boolean)
          || 'zh'
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@100..800&family=Noto+Sans+SC:wght@300;400;500;700;800;900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BookMiro - 把书读成随阅读进度展开的知识图谱" />
    <title>BookMiro - 把书读成知识图谱</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
