# Render Blueprint for BookMiro
# Backend: single-process Flask + gunicorn with a persistent disk for uploaded books.
# Frontend: static Vue build served with SPA rewrites.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: bookmiro-backend
    runtime: python
    rootDir: backend
    plan: starter # paid: free instances sleep (killing extraction) and cannot mount a disk
    buildCommand: pip install uv && uv sync --active --frozen
    # -w 1 is REQUIRED: ExtractionManager keeps progress in memory with background threads.
    startCommand: uv run --active gunicorn -w 1 --threads 8 -t 600 -b 0.0.0.0:$PORT "app:create_app()"
    healthCheckPath: /health
    disk:
      name: bookmiro-uploads
      mountPath: /var/data/uploads
      sizeGB: 1
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: UPLOAD_FOLDER
        value: /var/data/uploads
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://bookmiro-frontend.onrender.com,https://pageandnode.com,https://www.pageandnode.com
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL_NAME
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

  - type: web
    name: bookmiro-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # NOTE: this must be the backend's PUBLIC onrender.com URL, not a fromService/property:host
      # reference. fromService "host"/"hostport" give the *private network* hostname, which only
      # resolves between Render services and is unreachable from a browser running this static
      # site's JS (see https://render.com/docs/blueprint-spec - "Web services and private
      # services only" / static sites can't send or receive private network traffic). Using
      # fromService here previously caused ERR_NAME_NOT_RESOLVED for every API call in the browser.
      # If you rename the bookmiro-backend service, update this URL to match (or point it at a
      # custom domain instead).
      - key: VITE_API_BASE_URL
        value: https://bookmiro-backend.onrender.com
    routes:
      # SPA fallback for Vue Router history mode
      - type: rewrite
        source: /*
        destination: /index.html
